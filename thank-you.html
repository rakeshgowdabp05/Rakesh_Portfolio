<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Rakesh Portfolio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(29, 184, 138, 0.30), transparent 35%),
                radial-gradient(circle at bottom right, rgba(212, 105, 58, 0.22), transparent 35%),
                linear-gradient(135deg, #020617, #0f172a);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .thank-you-card {
            width: 100%;
            max-width: 520px;
            padding: 45px 35px;
            text-align: center;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
            animation: fadeUp 0.7s ease forwards;
            position: relative;
        }

        .thank-you-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, #38bdf8, #6366f1, #a855f7);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.7;
            pointer-events: none;
        }

        .icon-box {
            width: 88px;
            height: 88px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.45);
            animation: pop 0.6s ease forwards;
        }

        .icon-box i {
            font-size: 38px;
            color: #ffffff;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 14px;
            background: linear-gradient(135deg, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 13px 22px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, #1db88a, #7c3aed);
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.5);
        }

        .btn-secondary {
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(255, 255, 255, 0.06);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
        }

        .small-text {
            margin-top: 26px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            80% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .thank-you-card {
                padding: 36px 24px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <main class="thank-you-card">
        <div class="icon-box">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1>Thank You!</h1>

        <p>
            Your message has been sent successfully.
            I will get back to you as soon as possible.
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fa-solid fa-house"></i>
                Back to Home
            </a>

            <a href="https://github.com/rakeshgowdabp05" target="_blank" class="btn btn-secondary">
                <i class="fa-brands fa-github"></i>
                View GitHub
            </a>
        </div>

        <div class="small-text">
            Message received from Rakesh Portfolio Website
        </div>
    </main>
</body>

</html>
